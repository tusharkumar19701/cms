<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content}, ~{::title}, ~{::script})}">
<head>
    <title>Signup</title>
</head>
<body class="w-full">
    <div id="content" class="text-white mt-10 w-full">
        <div class="flex flex-col justify-center items-center">
            <div class="bg-gray-800 block p-6 w-1/3 rounded shadow-lg">
                <h5 class="mb-1 text-2xl font-bold tracking-tight text-gray-300">Signup</h5>
                <p class="font-normal text-sm text-gray-400">Start managing your contacts on cloud...</p>
                <form class="mt-3" action="">
                    <div class="">
                        <label for="email" class="block mb-1 text-sm font-medium text-heading">Email</label>
                        <input type="email" id="email" class="bg-gray-600 rounded text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="xyz@abc.com" required />
                    </div>
                    <div class="mt-4">
                        <label for="name" class="block mb-1 text-sm font-medium text-heading">Name</label>
                        <input type="text" id="name" class="bg-gray-600 rounded text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter username" required />
                    </div>
                    <div class="mt-4">
                        <label for="password" class="block mb-1 text-sm font-medium text-heading">New Password</label>
                        <input type="password" id="password" class="bg-gray-600 rounded text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter password" required />
                    </div>
                    <div class="mt-4">
                        <label for="phone" class="block mb-1 text-sm font-medium text-heading">Contact Number</label>
                        <input type="text" id="phone" class="bg-gray-600 rounded text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter contact number" required />
                    </div>
                    <div class="mt-4">
                        <label for="about" class="block mb-1 text-sm font-medium text-heading">About</label>
                        <textarea rows="4" id="about" class="bg-gray-600 rounded text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Write your thoughts here..."></textarea>
                    </div>
                    <div class="mt-3">
                        <button class="px-3 py-2 rounded dark:bg-blue-600 hover:bg-blue-800 cursor-pointer transition duration-300">Signup</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        console.log("Signupn page.");
    </script>
</body>
</html>
